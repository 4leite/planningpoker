name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      production_base_url:
        required: false
        default: ""
        type: string
    outputs:
      url:
        description: The deployed worker URL when one is known
        value: ${{ jobs.deploy.outputs.url }}
    secrets:
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true

jobs:
  deploy:
    name: ${{ inputs.environment }}
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number || '' }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          package-manager-cache: false
      - name: Corepack
        run: corepack enable pnpm
      - name: Enable pnpm cache
        uses: actions/setup-node@v6
        with:
          cache: pnpm
      - name: Install
        run: pnpm i
      - name: Deploy Worker
        id: deploy
        shell: bash
        run: bash scripts/deploy-worker.sh
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          PRODUCTION_BASE_URL: ${{ inputs.production_base_url }}
