name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      production_base_url:
        required: false
        default: ""
        type: string
      preview_base_domain:
        required: false
        default: ""
        type: string
      worker_name:
        required: false
        default: ""
        type: string
      preview_hostname_label:
        required: false
        default: ""
        type: string
    outputs:
      url:
        description: The deployed worker URL when one is known
        value: ${{ jobs.deploy.outputs.url }}
    secrets:
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true

jobs:
  deploy:
    name: ${{ inputs.environment }}
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          package-manager-cache: false
      - name: Corepack
        run: corepack enable pnpm
      - name: Enable pnpm cache
        uses: actions/setup-node@v6
        with:
          cache: pnpm
      - name: Install
        run: pnpm i
      - name: Deploy Worker
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          pnpm build

          deploy_args=()
          if [[ -n "${{ inputs.worker_name }}" ]]; then
            deploy_args+=(--name "${{ inputs.worker_name }}")
          fi

          deployed_url=""

          if [[ "${{ inputs.environment }}" == "production" && -n "${{ inputs.production_base_url }}" ]]; then
            production_hostname="${{ inputs.production_base_url }}"
            production_hostname="${production_hostname#https://}"
            production_hostname="${production_hostname#http://}"
            production_hostname="${production_hostname%%/*}"
            deploy_args+=(--domain "$production_hostname")
            deployed_url="https://$production_hostname"
          fi

          if [[ "${{ inputs.environment }}" == "preview" && -n "${{ inputs.preview_hostname_label }}" && -n "${{ inputs.preview_base_domain }}" ]]; then
            preview_hostname="${{ inputs.preview_hostname_label }}.${{ inputs.preview_base_domain }}"
            deploy_args+=(--domain "$preview_hostname")
            deployed_url="https://$preview_hostname"
          fi

          pnpm wrangler deploy "${deploy_args[@]}"

          if [[ -n "$deployed_url" ]]; then
            echo "url=${deployed_url}" >> "$GITHUB_OUTPUT"
            echo "Deployed URL: ${deployed_url}" >> "$GITHUB_STEP_SUMMARY"
          fi
